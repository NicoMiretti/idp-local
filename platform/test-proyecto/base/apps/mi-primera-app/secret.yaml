apiVersion: v1
kind: Secret
metadata:
  name: test-proyecto-secret
  namespace: test-proyecto
  labels:
    app.kubernetes.io/part-of: test-proyecto
    app.kubernetes.io/managed-by: argocd
  annotations:
    # Este Secret es compartido por todas las apps del proyecto test-proyecto.
    # Agregar las claves sensibles aquí. NUNCA commitear valores reales —
    # usar un gestor de secretos (Vault, Sealed Secrets, etc.) en producción.
type: Opaque
stringData:
  # Agregar variables sensibles aquí. Ejemplo:
  # DATABASE_URL: "postgresql://user:pass@host:5432/db"
  # API_KEY: "changeme"
  PLACEHOLDER: "replace-me"
