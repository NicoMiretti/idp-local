# values.yaml
# Valores para el Helm chart oficial de ArgoCD (argo/argo-cd).
# Este archivo es consumido por bootstrap.sh durante la instalación inicial.
# Referencia del chart: https://artifacthub.io/packages/helm/argo/argo-cd

# ---------------------------------------------------------------------------
# Servidor
# ---------------------------------------------------------------------------
server:
  # Desactivar TLS en el servidor internamente — el ingress maneja TLS.
  # Necesario para funcionar detrás de un ingress controller en Kind.
  extraArgs:
    - --insecure

# ---------------------------------------------------------------------------
# Configuración global de ArgoCD
# ---------------------------------------------------------------------------
configs:
  params:
    # Habilitar modo inseguro (sin TLS interno) — complementa server.extraArgs
    server.insecure: "true"

  # Configuración global de ArgoCD (argocd-cm)
  cm:
    # Habilita --enable-helm en kustomize para todas las Applications.
    # Necesario para usar el campo helmCharts dentro de kustomization.yaml.
    kustomize.buildOptions: "--enable-helm"

    # Health check personalizado para Ingress: en Kind con hostNetwork el
    # campo .status.loadBalancer.ingress nunca se llena, lo cual hace que
    # ArgoCD marque los Ingress como Progressing indefinidamente.
    # Esta customización lo considera Healthy en cuanto los backends existan.
    resource.customizations.health.networking.k8s.io_Ingress: |
      hs = {}
      hs.status = "Healthy"
      hs.message = "Ingress is healthy (Kind hostNetwork mode)"
      return hs

# ---------------------------------------------------------------------------
# Recursos
# Reducidos para entorno local de tesis (máquina single-node).
# ---------------------------------------------------------------------------
repoServer:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi

applicationSet:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi

notifications:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
