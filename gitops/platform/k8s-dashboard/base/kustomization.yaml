# kustomization.yaml — k8s-dashboard base
# Manifiestos RBAC del Kubernetes Dashboard.
# Declara el ServiceAccount admin-user con ClusterRoleBinding a cluster-admin,
# necesario para acceder al Dashboard con visibilidad completa del cluster.
#
# NOTA: el chart del Dashboard se instala via Helm nativo en ArgoCD
# (spec.sources[0] en k8s-dashboard-app.yaml), no via helmCharts aquí.
# El chart oficial migró a OCI (registry-1.docker.io/kubernetes/dashboard)
# y Kustomize no soporta repos OCI en helmCharts.
#
# Patrón: este base/ es referenciado por cada overlay (overlays/dev/,
# overlays/staging/, etc.) que agrega parches específicos del ambiente.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kubernetes-dashboard

resources:
  - admin-serviceaccount.yaml
