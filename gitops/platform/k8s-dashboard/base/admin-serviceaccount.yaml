# admin-serviceaccount.yaml
# ServiceAccount con permisos de cluster-admin para acceder al Dashboard
# con visibilidad completa de todos los recursos del cluster.
#
# IMPORTANTE: estos permisos son apropiados para un entorno local de tesis.
# En ambientes productivos se debe usar un rol con permisos mínimos necesarios.
#
# Para obtener el token de acceso al Dashboard:
#   kubectl -n kubernetes-dashboard create token admin-user

apiVersion: v1
kind: ServiceAccount
metadata:
  name: admin-user
  namespace: kubernetes-dashboard

---
# Vincula el ServiceAccount admin-user al rol cluster-admin built-in de Kubernetes,
# otorgando acceso de lectura/escritura a todos los recursos del cluster.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: admin-user
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: admin-user
    namespace: kubernetes-dashboard
