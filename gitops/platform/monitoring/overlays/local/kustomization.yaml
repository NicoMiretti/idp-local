# kustomization.yaml — Monitoring overlay local
# Customizaciones específicas para el ambiente local (Kind single-node).
# Extiende el base/ con parches o valores propios del entorno local.
#
# Ejemplos de lo que irá aquí en el futuro:
# - Values de Prometheus/Grafana con retención reducida para local
# - Recursos de CPU/memoria ajustados para la máquina de tesis
# - Desactivar componentes innecesarios en local (alertmanager, etc.)
# - Ingress local para acceder a la UI de Grafana

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Referencia al base común
bases:
  - ../../base

# Los patches para el ambiente local se agregarán aquí. Ejemplo futuro:
# patches:
#   - path: patch-retention.yaml
#   - path: patch-resources.yaml
