# kustomization.yaml — headlamp overlay dev
# Customizaciones específicas para el ambiente dev (Kind single-node).
# Extiende el base/ con parches propios del entorno dev.
#
# En dev Headlamp corre sin ingress — se accede via port-forward:
#   kubectl -n headlamp port-forward svc/headlamp 8080:80
#   → http://localhost:8080
#
# Token de acceso (válido 24h):
#   kubectl -n headlamp create token admin-user --duration=24h

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# Los patches para el ambiente dev se agregarán aquí. Ejemplo futuro:
# patches:
#   - path: patch-resources.yaml
