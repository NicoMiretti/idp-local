# admin-serviceaccount.yaml
# ServiceAccount con permisos de cluster-admin para autenticarse en Headlamp.
#
# Headlamp soporta autenticación via token de ServiceAccount.
# Este ServiceAccount tiene acceso completo al cluster (cluster-admin),
# apropiado para un entorno local de tesis donde el operador es el mismo
# que el usuario del cluster.
#
# IMPORTANTE: en ambientes productivos usar un rol con permisos mínimos.
#
# Para obtener el token de acceso:
#   kubectl -n headlamp create token admin-user --duration=24h

apiVersion: v1
kind: ServiceAccount
metadata:
  name: admin-user
  namespace: headlamp

---
# Vincula admin-user al rol cluster-admin built-in de Kubernetes.
# Esto le da visibilidad completa de todos los namespaces y recursos.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: headlamp-admin-user
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: admin-user
    namespace: headlamp
