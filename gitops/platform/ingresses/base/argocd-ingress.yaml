# argocd-ingress.yaml
# Ingress para exponer la UI de ArgoCD en http://argocd.local
#
# ArgoCD server por defecto solo habla HTTPS. Con --insecure en los args
# (o via argocd-cmd-params-cm) sirve HTTP directamente. Como estamos en
# un entorno local de un solo nodo, usamos HTTP plano sin TLS.
#
# El service argocd-server está en el namespace argocd.

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-ingress
  namespace: argocd
  annotations:
    # Forzar que nginx no redirija a HTTPS (ArgoCD corre en HTTP con --insecure)
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    # ArgoCD server habla HTTP cuando se le pasa --insecure; sin esto nginx
    # intentaría HTTPS al backend y fallaría con error de protocolo.
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
spec:
  ingressClassName: nginx
  rules:
    - host: argocd.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
