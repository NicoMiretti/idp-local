apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${{ values.appName }}
  namespace: ${{ values.projectName }}
  labels:
    app.kubernetes.io/name: ${{ values.appName }}
    app.kubernetes.io/part-of: ${{ values.projectName }}
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ${{ values.appName }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ${{ values.appName }}
        app.kubernetes.io/part-of: ${{ values.projectName }}
    spec:
      containers:
        - name: ${{ values.appName }}
          # Imagen que se actualizará via CI/CD cuando se haga push al repo de código.
          # registry.local:5000/<project>/<app>:latest apunta al registro interno de Kind.
          image: registry.local:5000/${{ values.projectName }}/${{ values.appName }}:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: ${{ values.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: ${{ values.appName }}-config
            - secretRef:
                name: ${{ values.projectName }}-secret
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
