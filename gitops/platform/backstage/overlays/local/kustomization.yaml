# kustomization.yaml — Backstage overlay local
# Customizaciones específicas para el ambiente local (Kind single-node).
# Extiende el base/ con parches, imágenes o configuraciones propias del entorno local.
#
# Ejemplos de lo que irá aquí en el futuro:
# - Patch de replicas (1 replica en local vs N en prod)
# - Imagen de Backstage con tag específico para desarrollo
# - ConfigMap con la URL del cluster local
# - Recursos de CPU/memoria reducidos para la máquina de tesis

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Referencia al base común
bases:
  - ../../base

# Los patches para el ambiente local se agregarán aquí. Ejemplo futuro:
# patches:
#   - path: patch-replicas.yaml
#   - path: patch-resources.yaml
#
# images:
#   - name: backstage
#     newTag: local-dev
