# kustomization.yaml — backstage base
# Instala Backstage via chart oficial backstage/backstage.
# Repo: https://backstage.github.io/charts
#
# Usa la imagen demo oficial (ghcr.io/backstage/backstage) con configuración
# mínima para que el portal sea accesible en backstage.local.
# PostgreSQL deshabilitado — la imagen demo usa SQLite en memoria.
#
# appConfig inyecta el app-config.yaml que Backstage necesita para arrancar:
# baseUrl apunta a backstage.local (HTTP, entorno local).

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: backstage

helmCharts:
  - name: backstage
    repo: https://backstage.github.io/charts
    version: "2.6.3"
    releaseName: backstage
    namespace: backstage
    valuesInline:
      backstage:
        image:
          registry: ghcr.io
          repository: backstage/backstage
          tag: latest
          pullPolicy: IfNotPresent

        # app-config.yaml mínimo para que Backstage arranque correctamente.
        # baseUrl debe coincidir con la URL pública del portal.
        appConfig:
          app:
            title: IDP Local
            baseUrl: http://backstage.local

          backend:
            baseUrl: http://backstage.local
            listen:
              port: 7007
              host: "0.0.0.0"
            cors:
              origin: http://backstage.local
            # Base de datos en memoria — sin persistencia, suficiente para demo.
            database:
              client: better-sqlite3
              connection: ":memory:"
            # Deshabilitar headers de seguridad que fuerzan HTTPS en entorno HTTP local.
            # Helmet por defecto activa HSTS y upgrade-insecure-requests que rompen HTTP.
            csp:
              upgrade-insecure-requests: false
            helmet:
              hsts: false
              contentSecurityPolicy:
                directives:
                  upgradeInsecureRequests: false

          # Catálogo con los componentes del IDP.
          catalog:
            rules:
              - allow: [Component, System, API, Group, User, Resource, Location]
            locations:
              - type: url
                target: https://github.com/NicoMiretti/idp-local/blob/main/catalog-info.yaml
                rules:
                  - allow: [Component, System]

          organization:
            name: IDP Local

        resources:
          requests:
            cpu: 100m
            memory: 256Mi

      # PostgreSQL deshabilitado — demo usa SQLite en memoria.
      postgresql:
        enabled: false

      service:
        type: ClusterIP
        ports:
          backend: 7007
