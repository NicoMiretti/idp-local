# kustomization.yaml — backstage base
# Instala Backstage via chart oficial backstage/backstage.
# Repo: https://backstage.github.io/charts
#
# Usa la imagen demo oficial (ghcr.io/backstage/backstage) con configuración
# mínima para que el portal sea accesible en backstage.local.
# PostgreSQL deshabilitado — la imagen demo usa SQLite en memoria.
#
# appConfig inyecta el app-config.yaml que Backstage necesita para arrancar:
# baseUrl apunta a backstage.local (HTTP, entorno local).

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: backstage

helmCharts:
  - name: backstage
    repo: https://backstage.github.io/charts
    version: "2.6.3"
    releaseName: backstage
    namespace: backstage
    valuesInline:
      backstage:
        image:
          registry: ghcr.io
          repository: backstage/backstage
          tag: latest
          pullPolicy: IfNotPresent

        # El chart pasa solo --config /app/app-config-from-configmap.yaml,
        # saltándose el app-config.yaml de la imagen que tiene app.baseUrl
        # compilado. Con extraArgs cargamos primero el config base de la imagen
        # y después el nuestro — Backstage los mergea en orden.
        args:
          - "--config"
          - "/app/app-config.yaml"
          - "--config"
          - "/app/app-config-from-configmap.yaml"

        # Exponer el token de GitHub como variable de entorno desde el secret.
        # El secret github-pat es creado manualmente (nunca va a Git).
        extraEnvVarsSecrets:
          - github-pat

        appConfig:
          app:
            title: IDP Local
            baseUrl: http://backstage.local

          backend:
            baseUrl: http://backstage.local
            listen:
              port: 7007
              host: "0.0.0.0"
            cors:
              origin: http://backstage.local
            database:
              client: better-sqlite3
              connection: ":memory:"
            # Quitar upgrade-insecure-requests del CSP — en HTTP local fuerza
            # al browser a pedir assets por HTTPS y rompe la UI.
            csp:
              upgrade-insecure-requests: false

          # dangerouslyAllowOutsideDevelopment: permite guest login cuando
          # app.baseUrl no es localhost. Requerido desde Backstage 1.26+.
          # Seguro en este contexto — entorno local de tesis, sin acceso externo.
          auth:
            providers:
              guest:
                dangerouslyAllowOutsideDevelopment: true

          # Integración con GitHub: usa el PAT del secret github-pat.
          # Necesario para que el Scaffolder pueda hacer commits al repo idp-local.
          integrations:
            github:
              - host: github.com
                token: ${token}

          # Scaffolder: usa el ServiceAccount del pod para acceder al cluster.
          # Permite crear recursos Kubernetes (ArgoCD Applications, namespaces)
          # como step de un template.
          kubernetes:
            serviceLocatorMethod:
              type: multiTenant
            clusterLocatorMethods:
              - type: config
                clusters:
                  - url: https://kubernetes.default.svc
                    name: kind-idp-local
                    authProvider: serviceAccount
                    skipTLSVerify: true
                    serviceAccountToken: ${KUBERNETES_SERVICE_ACCOUNT_TOKEN}

          catalog:
            rules:
              - allow: [Component, System, API, Group, User, Resource, Location, Template]
            locations:
              - type: url
                target: https://github.com/NicoMiretti/idp-local/blob/main/catalog-info.yaml
                rules:
                  - allow: [Component, System, Template, Location]
            # Reducir el intervalo de procesamiento para que los cambios
            # se reflejen más rápido (default es ~1 minuto con jitter)
            processingInterval: { minutes: 1 }

          organization:
            name: IDP Local

        resources:
          requests:
            cpu: 100m
            memory: 256Mi

      # PostgreSQL deshabilitado — demo usa SQLite en memoria.
      postgresql:
        enabled: false

      service:
        type: ClusterIP
        ports:
          backend: 7007

# RBAC para que el ServiceAccount backstage pueda crear namespaces
# y ArgoCD Applications desde el Scaffolder.
resources:
  - scaffolder-rbac.yaml

