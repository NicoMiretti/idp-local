apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: emulador-nintendo
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/NicoMiretti/idp-local.git
    targetRevision: HEAD
    path: gitops/platform/emulador-nintendo/overlays/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: emulador-nintendo

  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
