# k8s-dashboard-app.yaml
# Application de ArgoCD para Kubernetes Dashboard.
# Este archivo vive en gitops/apps/templates/ y es detectado automáticamente
# por la root-app (App-of-Apps). ArgoCD lo sincronizará sin intervención manual.
#
# Usa múltiples fuentes (sources) porque el chart del Dashboard migró a OCI
# (no compatible con helmCharts de Kustomize) y necesitamos también aplicar
# el ServiceAccount admin con ClusterRoleBinding desde nuestro repo Git.
#
# Fuente 1: chart OCI oficial del Kubernetes Dashboard via Helm nativo de ArgoCD.
# Fuente 2: manifiestos RBAC del repo (admin-serviceaccount.yaml) via Kustomize.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k8s-dashboard
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  sources:
    # Fuente 1: chart OCI del Dashboard — ArgoCD lo instala via Helm nativo
    - repoURL: registry-1.docker.io/kubernetes/dashboard
      targetRevision: "7.14.0"
      helm:
        releaseName: kubernetes-dashboard
        values: |
          app:
            ingress:
              enabled: false
          metrics-server:
            enabled: false

    # Fuente 2: RBAC admin desde nuestro repo Git (ServiceAccount + ClusterRoleBinding)
    - repoURL: https://github.com/NicoMiretti/idp-local.git
      targetRevision: HEAD
      path: gitops/platform/k8s-dashboard/base

  destination:
    server: https://kubernetes.default.svc
    namespace: kubernetes-dashboard

  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
