# test-proyecto-app.yaml
# ArgoCD Application para el proyecto test-proyecto.
# Generado automáticamente por Backstage Scaffolder.
#
# Proyecto de prueba end-to-end del scaffolder
#
# Apunta al overlay dev del proyecto en este mismo repo.
# ArgoCD sincronizará automáticamente al hacer merge del PR.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: test-proyecto
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    backstage.io/managed-by-location: "url:https://github.com/NicoMiretti/idp-local/blob/main/gitops/apps/templates/test-proyecto-app.yaml"
spec:
  project: default

  source:
    repoURL: https://github.com/NicoMiretti/idp-local.git
    targetRevision: HEAD
    path: /overlays/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: test-proyecto

  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
