# ingress-nginx-app.yaml
# Application de ArgoCD para ingress-nginx.
# Detectada automáticamente por la root-app (App-of-Apps).
#
# ingress-nginx es el Ingress Controller que enruta tráfico HTTP/HTTPS
# a los servicios del cluster. En Kind corre con hostNetwork + hostPort
# para aprovechar los puertos 80/443 mapeados en kind-config.yaml.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/NicoMiretti/idp-local.git
    targetRevision: HEAD
    path: gitops/platform/ingress-nginx/overlays/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx

  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
